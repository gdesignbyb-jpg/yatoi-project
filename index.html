<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Yatoi 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ══ RESET ══ */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ══ PALETTE ══ */
:root{
  --blush:   #F2D6D3;
  --rose:    #C4747A;
  --deep:    #8B3A42;
  --wine:    #5C1F28;
  --cream:   #FDF8F5;
  --gold:    #C9A96E;
  --gold2:   #E8C98A;
  --dark:    #1A0A0D;
  --muted:   #9A7070;
}

/* ══ BODY ══ */
body{
  background:var(--cream);
  font-family:'Cormorant Garamond',serif;
  color:var(--dark);
  overflow-x:hidden;
  min-height:100vh;
}

/* ══ FLOATING MUSIC BUTTON ══ */
.float-note{
  position:fixed;bottom:24px;right:24px;z-index:100;
  width:52px;height:52px;border-radius:50%;
  background:var(--wine);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 4px 20px rgba(92,31,40,0.4);
  cursor:pointer;
  animation:bobble 2s ease infinite;
  text-decoration:none;
}
@keyframes bobble{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* (ALL YOUR ORIGINAL STYLES REMAIN EXACTLY THE SAME — unchanged for brevity) */
</style>
</head>

<body>

<!-- FLOATING MUSIC BUTTON (FIXED LINK) -->
<a href="https://open.spotify.com/track/7vlPI45Zzzk0palLdKry4k?si=ieCC9VRJSvaZkDDSMcII0Q" target="_blank" class="float-note" title="Play our song 🎵">🎵</a>

<!-- ALL YOUR ORIGINAL HTML CONTENT UNCHANGED ABOVE THIS POINT -->

<!-- ══════════ MUSIC QR (FIXED) ══════════ -->
<div class="qr-wrap">
  <div class="qr-inner">
    <img 
      src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://youtu.be/XNwwZ56xz8A?si=F19b0G0ksmufSs6g"
      width="140"
      height="140"
      alt="QR Code"
    />
  </div>
</div>

<!-- ══════════ SCRIPT ══════════ -->
<script>
const petalsCanvas = document.getElementById('petals');
const petalEmojis = ['🌸','🌺','🌹','💮','🏵️','✿','❀'];

function createPetal(){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.left = Math.random()*100 + 'vw';
  p.style.fontSize = (Math.random()*12 + 8) + 'px';
  p.style.animationDuration = (Math.random()*6 + 5) + 's';
  p.style.animationDelay = (Math.random()*8) + 's';
  petalsCanvas.appendChild(p);
  setTimeout(()=>{p.remove();},14000);
}
setInterval(createPetal, 800);

/* FIXED YES BUTTON */
function sayYes(){

  // WhatsApp redirect (FIXED)
  const message = encodeURIComponent("Yes 🌹");
  window.open("https://wa.me/254705833602?text=" + message, "_blank");

  // Confetti
  for(let i=0;i<40;i++){
    setTimeout(()=>{
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.textContent = ['🌹','💌','✨','🥂','💕','🌸'][Math.floor(Math.random()*6)];
      c.style.left = Math.random()*100 + 'vw';
      c.style.animationDuration = (Math.random()*1.5+1.5)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),3000);
    },i*60);
  }

  document.getElementById('question').style.display='none';
  const resp = document.getElementById('response');
  resp.classList.add('visible');
  resp.scrollIntoView({behavior:'smooth', block:'center'});
}
</script>

</body>
</html>
